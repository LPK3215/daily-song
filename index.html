<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Song</title>
  <meta name="description" content="Daily Song - Immersive music experience, one song a day." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.82em' font-size='78'>♫</text></svg>" />
  <link rel="manifest" href="assets/pwa/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/card.css" />
  <link rel="stylesheet" href="assets/css/player.css" />
</head>
<body>
  <main class="card" id="card" aria-live="polite">
    <!-- Left corner: Background switch button -->
    <button class="bg-btn" id="bgBtn" type="button" aria-label="Switch background">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>

    <!-- Accent theme switch button -->
    <button class="theme-btn" id="themeBtn" type="button" aria-label="Switch accent color">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/>
      </svg>
    </button>

    <!-- Right corner: Fullscreen button -->
    <button class="fullscreen-btn" id="fullscreenBtn" type="button" aria-label="Fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>

    <div class="card__layout">
      <!-- Circular cover -->
      <div class="card__cover-col">
        <div class="cover" id="cover">
          <div class="cover__fallback" id="coverFallback" aria-hidden="true">
            <span class="cover__note">♪</span>
          </div>
        </div>
      </div>

      <!-- Content area -->
      <div class="card__content-col">
        <!-- Daily Song + Date -->
        <header class="card__head">
          <span class="card__brand">Daily Song</span>
          <span class="card__date" id="date">--</span>
        </header>

        <!-- Song info -->
        <div class="meta">
          <h1 class="meta__title" id="title">Loading...</h1>
          <p class="meta__artist" id="artist"></p>
        </div>

        <!-- Player -->
        <section class="player" id="player">
          <div class="controls" id="controls" hidden>
            <!-- Three buttons: Restart / Play / Volume -->
            <div class="controls__row">
              <button class="btn-restart" id="restartBtn" type="button" aria-label="Restart">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/>
                </svg>
              </button>

              <button class="btn-play" id="playBtn" type="button" aria-label="Play">
                <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 5v14l11-7z" />
                </svg>
                <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 5h4v14H6zM14 5h4v14h-4z" />
                </svg>
              </button>

              <button class="btn-volume" id="volumeBtn" type="button" aria-label="Mute">
                <svg class="icon-volume" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>

            <!-- Progress bar -->
            <div class="progress" id="progress" role="slider" tabindex="0" aria-label="Progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div class="progress__fill" id="progressFill"></div>
              <div class="progress__thumb" id="progressThumb"></div>
            </div>

            <!-- Time display -->
            <div class="time">
              <span id="cur">0:00</span>
              <span class="time__sep">/</span>
              <span id="dur">0:00</span>
            </div>

            <audio id="audio" preload="metadata"></audio>
          </div>

          <div class="embed" id="embed" hidden></div>
          <p class="error" id="error" hidden>Failed to load. Please refresh.</p>
        </section>

        <!-- Note -->
        <p class="note" id="note" hidden></p>
      </div>
    </div>
  </main>

  <script type="module" src="assets/js/main.js"></script>

  <!-- Theme switching is handled by themeSwitch.js (imported in main.js) -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // Fullscreen button
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      if (fullscreenBtn) {
        fullscreenBtn.onclick = () => {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
              console.error('Fullscreen request failed:', err);
            });
          } else {
            document.exitFullscreen();
          }
        };
      }

      // Fullscreen state change
      document.addEventListener('fullscreenchange', () => {
        if (fullscreenBtn) {
          if (document.fullscreenElement) {
            fullscreenBtn.setAttribute('aria-label', 'Exit fullscreen');
          } else {
            fullscreenBtn.setAttribute('aria-label', 'Fullscreen');
          }
        }
      });

      // Keyboard shortcuts (Playback + Progress control)
      // Note: Theme switching shortcuts are handled in themeSwitch.js
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        // Space or Enter: Play/Pause
        if ((e.key === ' ' || e.key === 'Enter') && !e.ctrlKey && !e.metaKey && !e.altKey) {
          e.preventDefault();
          const playBtn = document.getElementById('playBtn');
          if (playBtn) playBtn.click();
        }

        // Arrow keys: Control progress (±5s)
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          e.preventDefault();
          const audio = document.getElementById('audio');
          if (audio && isFinite(audio.duration) && audio.duration > 0) {
            if (e.key === 'ArrowRight') {
              audio.currentTime = Math.min(audio.currentTime + 5, audio.duration);
            } else {
              audio.currentTime = Math.max(0, audio.currentTime - 5);
            }
          }
        }
      });
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/assets/pwa/sw.js").catch(() => { });
    }
  </script>
</body>
</html>
