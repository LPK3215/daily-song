<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>每日一歌</title>
  <meta name="description" content="每日一歌 —— 每天一首，点开即听。" />

  <!-- Open Graph / 分享卡片 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="每日一歌" />
  <meta property="og:description" content="每天一首，点开即听。" />
  <meta property="og:image" content="media/covers/og.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />

  <!-- 衬线字体：标题用 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />

  <!-- 样式按职责拆分，顺序：基础 → 卡片 → 播放器 → 主题 -->
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/card.css" />
  <link rel="stylesheet" href="assets/css/player.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body>
  <main class="card" id="card" aria-live="polite">
    <header class="card__head">
      <span class="card__brand">每日一歌</span>
      <span class="card__dot">·</span>
      <span class="card__date" id="date">——</span>
    </header>

    <!-- 封面 -->
    <div class="cover" id="cover">
      <div class="cover__fallback" id="coverFallback" aria-hidden="true">🎵</div>
    </div>

    <!-- 歌曲信息 -->
    <div class="meta">
      <h1 class="meta__title" id="title">加载中…</h1>
      <p class="meta__artist" id="artist"></p>
    </div>

    <!-- 播放区：local/url 用自定义控件；embed 用 iframe -->
    <section class="player" id="player">
      <!-- 自定义控件（local / url） -->
      <div class="controls" id="controls" hidden>
        <div class="controls__row">
          <button class="btn btn--ghost" id="restartBtn" type="button" aria-label="重新开始">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          </button>
          <button class="play" id="playBtn" type="button" aria-label="播放">
            <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true" hidden><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
          </button>
        </div>
        <div class="progress" id="progress" role="slider" tabindex="0"
             aria-label="进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress__fill" id="progressFill"></div>
          <div class="progress__thumb" id="progressThumb"></div>
        </div>
        <div class="time"><span id="cur">0:00</span> / <span id="dur">0:00</span></div>

        <!-- 音波可视化（纯 CSS 动画，播放时激活） -->
        <div class="soundwave" aria-hidden="true">
          <span style="--i:0"></span><span style="--i:1"></span><span style="--i:2"></span>
          <span style="--i:3"></span><span style="--i:4"></span><span style="--i:5"></span>
          <span style="--i:6"></span><span style="--i:7"></span><span style="--i:8"></span>
          <span style="--i:9"></span><span style="--i:10"></span><span style="--i:11"></span>
        </div>
        <audio id="audio" preload="metadata"></audio>
      </div>

      <!-- 平台外链（embed） -->
      <div class="embed" id="embed" hidden></div>

      <!-- 错误兜底 -->
      <p class="error" id="error" hidden>今日歌曲加载失败 😢</p>
    </section>

    <!-- 今日寄语 -->
    <p class="note" id="note" hidden></p>
  </main>

  <!-- ES 模块入口 -->
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
